name: Run codegen manually

on:
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run codegen
        run: echo "Running npm run codegen and output to a new file" > codegen-output.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Automated: Run codegen'
          title: '[Automated] - Run codegen'
          body: 'This PR was automatically generated by a GitHub Actions workflow.'
          base: main
          branch: automated-update-branch
          delete-branch: true
